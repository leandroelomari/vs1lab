<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<script>
function validate_tag() {
/* ... your code here ... */
    let tag_name = document.forms["tag-form"]["tag_name"].value;
    if (tag_name == "") {
        alert("name cannot be empty");
        return false;
    } else if (tag_name.length > 10) {
        alert("name cannot be longer than 10 characters");
        return false;
    }
    let tag_tag = document.forms["tag-form"]["tag_tag"].value;
    if (tag_tag[0] != '#') {
        alert("tag needs to start with #");
        return false;
    } else if (tag_tag.length > 11) { //# + 10
        alert("tag cannot be longer than 10 characters");
        return false
    }
}

function validate_discovery() {
/* ... your code here ... */
    let tag_name = document.forms["discoveryFilterForm"]["discovery_name"].value;
    if (tag_name == "") {
        alert("name cannot be empty");
        return false;
    } else if (tag_name.length > 10) {
        alert("name cannot be longer than 10 characters");
        return false;
    }
}
</script>

<head>
    <!-- Leaflet CSS and JavaScript (in this order) -->
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <section class="main__tagging tagging">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post" onsubmit="return validate_tag()">

                <!-- ... your code here ... -->
                <fieldset class="tagging_fieldset">
                    <legend>Add a new GeoTag</legend>
                    <label>Latitude</label>
                    <input type="text" id="tag_latitude" placeholder="1234" disabled>
                    <label>Longitude</label>
                    <input type="text" id="tag_longitude" placeholder="5678" disabled>
                    <label>Name</label>
                    <input type="text" id="tag_name" placeholder="e.g. HKA">
                    <label>Hashtag</label>
                    <input type="text" id="tag_tag" placeholder="e.g. #edu">
                    <input type="submit" value="Add Tag">
                </fieldset>

            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post" onsubmit="return validate_discovery()">

                <!-- ... your code here ... -->
                <fieldset class="discovery_fieldset">
                    <legend>Search</legend>
                    <div class="discovery_inputs">
                        <label>Search term or keywords:</label>
                        <input type="text" id="discovery_name" placeholder="e.g. HKA">
                        <input type="submit" value="Search">
                    </div>
                    <div class="discovery__spacer"></div>
                </fieldset>
            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
    <!-- Load JavaScripts
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="./javascripts/geotagging.js"></script>
</body>

</html>
