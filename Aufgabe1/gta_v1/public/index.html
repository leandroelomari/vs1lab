<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<script>
</script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <section class="main__tagging tagging">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post">

                <!-- ... your code here ... -->
                <fieldset class="tagging_fieldset">
                    <legend>Add a new GeoTag</legend>

                    <label for="tag-latitude">Latitude</label>
                    <input type="text" id="tag-latitude" name="latitude" placeholder="1234" readonly>

                    <label for="tag-longitude">Longitude</label>
                    <input type="text" id="tag-longitude" name="longitude" placeholder="5678" readonly>

                    <label for="tag-name">Name</label>
                    <input type="text" id="tag-name" name="name" placeholder="e.g. HKA" required maxlength="10" pattern="[A-Za-z]{1,10}">

                    <label for="tag-hashtag">Hashtag</label>
                    <input type="text" id="tag-hashtag" name="hashtag" placeholder="#edu" maxlength="11" pattern="#[A-Za-z]{1,10}">

                    <button type="submit">Save GeoTag</button>
                </fieldset>

            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">

                <!-- ... your code here ... -->
                <fieldset class="discovery_fieldset">
                    <legend>Search</legend>
                    <div class="discovery_inputs">
                        <label for="discovery-searchterm">Search term or keywords:</label>
                        <input type="text" id="discovery-searchterm" name="searchterm" placeholder="e.g. HKA">
                        <input type="hidden" id="discovery-latitude" name="latitude" value="1234">
                        <input type="hidden" id="discovery-longitude" name="longitude" value="5678">
                        <button type="submit">Search</button>
                    </div>
                    <div class="discovery__spacer"></div>
                </fieldset>
            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
