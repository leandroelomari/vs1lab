<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <section class="main__tagging tagging">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post">
                <fieldset class="tagging__fieldset">
                    <legend>Create a new GeoTag</legend>
                    <label for="tagging_latitude_input">Latitude:</label>
                    <input id="tagging_latitude_input" placeholder="49.01514" disabled>
                    <label for="tagging_longitude_input">Longitude:</label>
                    <input id="tagging_longitude_input" placeholder = "8.39002" disabled>
                    <label for="tagging_name_input">Name:</label>
                    <input id="tagging_name_input" placeholder="e.g. HKA Campus">
                    <label for="tagging_hashtag_input">Hashtag:</label>
                    <input id="tagging_hashtag_input" placeholder="e.g. Studium">
                    <button id="tagging_create_geotag_button" type="submit">Create GeoTag</button>
                </fieldset>
            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
                <fieldset class="discovery__fieldset">
                    <legend>Search for GeoTags</legend>
                    <label for="discovery_search_input">Search term:</label>
                    <input id="discovery_search_input" placeholder="e.g. Karlsruhe">
                    <button id="discovery_search_button" type="submit" onclick="return validate_discovery_form()">Search</button>
                </fieldset>
            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>

    <script>
        const tagging_form = document.getElementById("tag-form");
        const discovery_form = document.getElementById("discoveryFilterForm")
        tagging_form.addEventListener("submit", function(event) {
            let name = document.getElementById("tagging_name_input").value;
            let tag = document.getElementById("tagging_hashtag_input").value;
            if(name == "") {
                event.preventDefault();
                alert("Error: Name cannot be left blank");
                return;
            }
            if(name.length > 10) {
                event.preventDefault();
                alert("Error: Name cannot be longer than 10 characters");
                return;
            }
            if(!tag || tag[0] !== "#") {
                event.preventDefault();
                alert("Error: Hashtag must begin with the # character");
                return;
            }
            if(tag.length > 11) {
                event.preventDefault();
                alert("Error: Hashtag cannot be longer than 10 characters after the # character");
                return;
            }
        });

        discovery_form.addEventListener("submit", function(event) {
            let search = document.getElementById("discovery_search_input").value;
            if(search == "") {
                event.preventDefault();
                alert("Error: Searchterm cannot be left blank");
                return;
            }
            if(search.length > 10) {
                event.preventDefault();
                alert("Error: Searchterm cannot be longer than 10 characters");
                return;
            }
        });


    </script>

</body>

</html>
